baseURL = 'https://waterflowers.github.io/'
title = 'WaterFlowers 的知识库'
theme = 'DoIt'
locale = 'zh-cn'

[params]
  # 首页个人简介模式（大气学术风）
  [params.home.profile]
    enable = true
    title = '探索 · 记录 · 分享'
    subtitle = '一个技术人的学术笔记'
   avatarURL = '/images/avatar.jpg'         # 如果有头像图片
    description = '这里是 WaterFlowers 的个人知识库，记录学习与思考。'
    social = true

  # 作者信息
  [params.author]
    name = 'WaterFlowers'
    link = 'https://github.com/WaterFlowers'

  [params.social]
    github = 'WaterFlowers'
    email = 'your@email.com'
    rss = true

  # 搜索
  [params.search]
    enable = true
    type = 'lunr'

  # 主题模式
  [params.theme]
    default = 'auto'

  # 代码复制
  [params.code]
    copy = true

# 导航菜单
[[menu.main]]
  name = '文档'
  url = '/docs/'
  weight = 1

[[menu.main]]
  name = '博客'
  url = '/posts/'
  weight = 2

[[menu.main]]
  name = '标签'
  url = '/tags/'
  weight = 3

[[menu.main]]
  name = '关于'
  url = '/about/'
  weight = 4